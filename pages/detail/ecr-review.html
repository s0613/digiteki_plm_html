<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/shell}">
<head>
  <title>ECR 검토</title>
</head>
<body>
  <th:block layout:fragment="content">
    <turbo-frame id="main-content">

      <!-- ECR 검토 콘텐츠 영역 -->
      <!-- 설계변경 작성 중 각 부서에 업무를 할당하는 리스트 -->
      <div class="content-page-digitek">
        <div class="digitek-sections">
          <div class="accordion-digitek-page">
            <div class="accordion-digitek-page-header accordion-digitek-page-header-open">
              <span class="accordion-digitek-page-title">ECR 검토</span>
            </div>
            <div class="accordion-digitek-page-content">

          <!-- 상단 우측 버튼 -->
          <div class="d-flex justify-content-end mb-digitek-12 gap-digitek-8">
            <!-- [커스텀] 추가 클릭 시 새 부서 그룹 행 동적 추가 -->
            <button type="button" class="btn btn-digitek btn-digitek-outline btn-digitek-36">추가</button>
            <!-- [커스텀] 삭제 클릭 시 체크된 부서 그룹 행 삭제 -->
            <button type="button" class="btn btn-digitek btn-digitek-outline btn-digitek-36">삭제</button>
          </div>

          <!-- 헤더 테이블 (컬럼 제목 행) -->
          <table class="table-digitek" style="table-layout:fixed">
            <colgroup>
              <col style="width: 34px">
              <col style="width: 110px">
              <col>
            </colgroup>
            <thead>
              <tr>
                <th><label class="checkbox-digitek"><input type="checkbox" aria-label="전체 선택"></label></th>
                <th>부서</th>
                <th>검토 의견</th>
              </tr>
            </thead>
          </table>

          <!-- 부서 그룹 목록 (각 그룹이 독립된 박스로 분리) -->
          <div class="d-flex flex-column gap-digitek-8 mt-digitek-8">
            <!-- [구조 참고] 각 그룹은 table-digitek으로 독립된 테이블 -->
            <table class="table-digitek" style="table-layout:fixed">
              <colgroup>
                <col style="width: 34px">
                <col style="width: 110px">
                <col>
              </colgroup>
              <tbody>
                <tr>
                  <td class="text-center"><label class="checkbox-digitek"><input type="checkbox" aria-label="행 선택"></label></td>
                  <td class="text-center fw-semibold">R&amp;D</td>
                  <td>변경 요청에 따른 설계 자체 부품의 변경은 설계상 큰 문제가 없을 것으로 판단됨.</td>
                </tr>
                <tr>
                  <td colspan="2" class="form-label-cell-digitek text-center" style="font-size:12px">
                    변경 대상 업무
                    <button type="button" class="btn-digitek-circle-sm" aria-label="업무 추가">+</button>
                  </td>
                  <td class="p-0">
                    <table class="table-digitek">
                      <thead>
                        <tr>
                          <th>수행 업무</th>
                          <th style="width:70px">부서</th>
                          <th style="width:110px">담당자</th>
                          <th style="width:150px">완료예정일</th>
                          <th style="width:42px">삭제</th>
                        </tr>
                      </thead>
                      <tbody data-draggable-table>
                        <tr draggable="true" class="draggable-row">
                          <td><button type="button" class="table-digitek-action-link">기구도면</button></td>
                          <td>R&amp;D</td>
                          <td>김연구</td>
                          <td>
                            <div class="date-select-digitek">
                              <button type="button" class="date-select-digitek-trigger" aria-label="날짜 선택" aria-haspopup="dialog">
                                <span class="date-select-digitek-text">2026-01-01</span>
                                <i class="dicon dicon-calendar icon-digitek-20 date-select-digitek-icon" style="color: #767676;" aria-hidden="true"></i>
                              </button>
                              <input type="hidden" name="completionDate" value="2026-01-01">
                            </div>
                          </td>
                          <td class="text-center"><button type="button" class="btn btn-digitek btn-digitek-outline btn-digitek-24" aria-label="삭제"><i class="dicon dicon-close" aria-hidden="true"></i></button></td>
                        </tr>
                        <tr draggable="true" class="draggable-row">
                          <td><button type="button" class="table-digitek-action-link">BOM</button></td>
                          <td></td>
                          <td><button type="button" class="table-digitek-action-link">사용자 검색</button></td>
                          <td>
                            <div class="date-select-digitek">
                              <button type="button" class="date-select-digitek-trigger" aria-label="날짜 선택" aria-haspopup="dialog">
                                <span class="date-select-digitek-text date-select-digitek-placeholder">0000-00-00</span>
                                <i class="dicon dicon-calendar icon-digitek-20 date-select-digitek-icon" style="color: #767676;" aria-hidden="true"></i>
                              </button>
                              <input type="hidden" name="completionDate" value="">
                            </div>
                          </td>
                          <td class="text-center"><button type="button" class="btn btn-digitek btn-digitek-outline btn-digitek-24" aria-label="삭제"><i class="dicon dicon-close" aria-hidden="true"></i></button></td>
                        </tr>
                        <tr draggable="true" class="draggable-row">
                          <td><button type="button" class="table-digitek-action-link">DFMEA</button></td>
                          <td></td>
                          <td><button type="button" class="table-digitek-action-link">사용자 검색</button></td>
                          <td>
                            <div class="date-select-digitek">
                              <button type="button" class="date-select-digitek-trigger" aria-label="날짜 선택" aria-haspopup="dialog">
                                <span class="date-select-digitek-text date-select-digitek-placeholder">0000-00-00</span>
                                <i class="dicon dicon-calendar icon-digitek-20 date-select-digitek-icon" style="color: #767676;" aria-hidden="true"></i>
                              </button>
                              <input type="hidden" name="completionDate" value="">
                            </div>
                          </td>
                          <td class="text-center"><button type="button" class="btn btn-digitek btn-digitek-outline btn-digitek-24" aria-label="삭제"><i class="dicon dicon-close" aria-hidden="true"></i></button></td>
                        </tr>
                      </tbody>
                    </table>
                  </td>
                </tr>
              </tbody>
            </table>

            <!-- ── 그룹 2: 구매 ── -->
            <table class="table-digitek" style="table-layout:fixed">
              <colgroup>
                <col style="width: 34px">
                <col style="width: 110px">
                <col>
              </colgroup>
              <tbody>
                <tr>
                  <td class="text-center"><label class="checkbox-digitek"><input type="checkbox" aria-label="행 선택"></label></td>
                  <td class="text-center fw-semibold">구매</td>
                  <td>업체 확인 결과 부품 수배에는 큰 영향 없음</td>
                </tr>
                <tr>
                  <td colspan="2" class="form-label-cell-digitek text-center" style="font-size:12px">
                    변경 대상 업무
                    <button type="button" class="btn-digitek-circle-sm" aria-label="업무 추가">+</button>
                  </td>
                  <td class="p-0">
                    <!-- [커스텀] data-draggable-table 속성으로 행 드래그 순서 변경 활성화 -->
                    <table class="table-digitek">
                      <thead>
                        <tr>
                          <th>수행 업무</th>
                          <th style="width:70px">부서</th>
                          <th style="width:110px">담당자</th>
                          <th style="width:150px">완료예정일</th>
                          <th style="width:42px">삭제</th>
                        </tr>
                      </thead>
                      <tbody data-draggable-table>
                        <tr draggable="true" class="draggable-row">
                          <td><button type="button" class="table-digitek-action-link">업체 검사협정서</button></td>
                          <td>구매</td>
                          <td>황구매</td>
                          <td>
                            <div class="date-select-digitek">
                              <button type="button" class="date-select-digitek-trigger" aria-label="날짜 선택" aria-haspopup="dialog">
                                <span class="date-select-digitek-text">2026-01-01</span>
                                <i class="dicon dicon-calendar icon-digitek-20 date-select-digitek-icon" style="color: #767676;" aria-hidden="true"></i>
                              </button>
                              <input type="hidden" name="completionDate" value="2026-01-01">
                            </div>
                          </td>
                          <td class="text-center"><button type="button" class="btn btn-digitek btn-digitek-outline btn-digitek-24" aria-label="삭제"><i class="dicon dicon-close" aria-hidden="true"></i></button></td>
                        </tr>
                        <tr draggable="true" class="draggable-row">
                          <td><button type="button" class="table-digitek-action-link">업체 검사기준서</button></td>
                          <td>구매</td>
                          <td>황구매</td>
                          <td>
                            <div class="date-select-digitek">
                              <button type="button" class="date-select-digitek-trigger" aria-label="날짜 선택" aria-haspopup="dialog">
                                <span class="date-select-digitek-text">2026-01-01</span>
                                <i class="dicon dicon-calendar icon-digitek-20 date-select-digitek-icon" style="color: #767676;" aria-hidden="true"></i>
                              </button>
                              <input type="hidden" name="completionDate" value="2026-01-01">
                            </div>
                          </td>
                          <td class="text-center"><button type="button" class="btn btn-digitek btn-digitek-outline btn-digitek-24" aria-label="삭제"><i class="dicon dicon-close" aria-hidden="true"></i></button></td>
                        </tr>
                        <tr draggable="true" class="draggable-row">
                          <td><button type="button" class="table-digitek-action-link">업체 품질협양서</button></td>
                          <td>구매</td>
                          <td>황구매</td>
                          <td>
                            <div class="date-select-digitek">
                              <button type="button" class="date-select-digitek-trigger" aria-label="날짜 선택" aria-haspopup="dialog">
                                <span class="date-select-digitek-text">2026-01-01</span>
                                <i class="dicon dicon-calendar icon-digitek-20 date-select-digitek-icon" style="color: #767676;" aria-hidden="true"></i>
                              </button>
                              <input type="hidden" name="completionDate" value="2026-01-01">
                            </div>
                          </td>
                          <td class="text-center"><button type="button" class="btn btn-digitek btn-digitek-outline btn-digitek-24" aria-label="삭제"><i class="dicon dicon-close" aria-hidden="true"></i></button></td>
                        </tr>
                      </tbody>
                    </table>
                  </td>
                </tr>
              </tbody>
            </table>

            <!-- ── 그룹 3: 품질 ── -->
            <table class="table-digitek" style="table-layout:fixed">
              <colgroup>
                <col style="width: 34px">
                <col style="width: 110px">
                <col>
              </colgroup>
              <tbody>
                <tr>
                  <td class="text-center"><label class="checkbox-digitek"><input type="checkbox" aria-label="행 선택"></label></td>
                  <td class="text-center fw-semibold">품질</td>
                  <td>변경 적용 시 품질 개선이 기대됨. 품질적인 리스크 위협은 없을 것으로 판단됨.</td>
                </tr>
                <tr>
                  <td colspan="2" class="form-label-cell-digitek text-center" style="font-size:12px">
                    변경 대상 업무
                    <button type="button" class="btn-digitek-circle-sm" aria-label="업무 추가">+</button>
                  </td>
                  <td class="p-0">
                    <table class="table-digitek">
                      <thead>
                        <tr>
                          <th>수행 업무</th>
                          <th style="width:70px">부서</th>
                          <th style="width:110px">담당자</th>
                          <th style="width:150px">완료예정일</th>
                          <th style="width:42px">삭제</th>
                        </tr>
                      </thead>
                      <tbody data-draggable-table>
                        <tr draggable="true" class="draggable-row">
                          <td><button type="button" class="table-digitek-action-link">품질관리계획서</button></td>
                          <td>품질</td>
                          <td>박품질</td>
                          <td>
                            <div class="date-select-digitek">
                              <button type="button" class="date-select-digitek-trigger" aria-label="날짜 선택" aria-haspopup="dialog">
                                <span class="date-select-digitek-text">2026-01-01</span>
                                <i class="dicon dicon-calendar icon-digitek-20 date-select-digitek-icon" style="color: #767676;" aria-hidden="true"></i>
                              </button>
                              <input type="hidden" name="completionDate" value="2026-01-01">
                            </div>
                          </td>
                          <td class="text-center"><button type="button" class="btn btn-digitek btn-digitek-outline btn-digitek-24" aria-label="삭제"><i class="dicon dicon-close" aria-hidden="true"></i></button></td>
                        </tr>
                        <tr draggable="true" class="draggable-row">
                          <td><button type="button" class="table-digitek-action-link">QPR_8D보고서</button></td>
                          <td>품질</td>
                          <td>박품질</td>
                          <td>
                            <div class="date-select-digitek">
                              <button type="button" class="date-select-digitek-trigger" aria-label="날짜 선택" aria-haspopup="dialog">
                                <span class="date-select-digitek-text">2026-01-01</span>
                                <i class="dicon dicon-calendar icon-digitek-20 date-select-digitek-icon" style="color: #767676;" aria-hidden="true"></i>
                              </button>
                              <input type="hidden" name="completionDate" value="2026-01-01">
                            </div>
                          </td>
                          <td class="text-center"><button type="button" class="btn btn-digitek btn-digitek-outline btn-digitek-24" aria-label="삭제"><i class="dicon dicon-close" aria-hidden="true"></i></button></td>
                        </tr>
                        <tr draggable="true" class="draggable-row">
                          <td><button type="button" class="table-digitek-action-link">신뢰성 시험 결과서</button></td>
                          <td>품질</td>
                          <td>박품질</td>
                          <td>
                            <div class="date-select-digitek">
                              <button type="button" class="date-select-digitek-trigger" aria-label="날짜 선택" aria-haspopup="dialog">
                                <span class="date-select-digitek-text">2026-01-01</span>
                                <i class="dicon dicon-calendar icon-digitek-20 date-select-digitek-icon" style="color: #767676;" aria-hidden="true"></i>
                              </button>
                              <input type="hidden" name="completionDate" value="2026-01-01">
                            </div>
                          </td>
                          <td class="text-center"><button type="button" class="btn btn-digitek btn-digitek-outline btn-digitek-24" aria-label="삭제"><i class="dicon dicon-close" aria-hidden="true"></i></button></td>
                        </tr>
                      </tbody>
                    </table>
                  </td>
                </tr>
              </tbody>
            </table>

            <!-- ── 그룹 4: 신규 입력 행 ── -->
            <!-- [커스텀] 추가 버튼 클릭 시 이 구조로 동적 행 삽입 -->
            <table class="table-digitek" style="table-layout:fixed">
              <colgroup>
                <col style="width: 34px">
                <col style="width: 110px">
                <col>
              </colgroup>
              <tbody>
                <tr>
                  <td class="text-center"><label class="checkbox-digitek"><input type="checkbox" aria-label="행 선택"></label></td>
                  <td>
                    <div class="select-digitek">
                      <button type="button" class="select-digitek-trigger" aria-haspopup="listbox" aria-expanded="false" aria-label="부서 선택">
                        <span class="select-digitek-text select-digitek-placeholder">선택하세요</span>
                        <i class="dicon dicon-chevron-down select-digitek-icon" aria-hidden="true"></i>
                      </button>
                      <select style="display:none" name="deptSelect">
                        <option value="" disabled selected>선택하세요</option>
                        <option value="sales">영업</option>
                        <option value="rnd">R&amp;D</option>
                        <option value="purchase">구매</option>
                        <option value="quality">품질</option>
                      </select>
                    </div>
                  </td>
                  <td><input type="text" class="form-control input-digitek input-digitek-sm" placeholder="검토 의견을 입력하세요"></td>
                </tr>
                <tr>
                  <td colspan="2" class="form-label-cell-digitek text-center" style="font-size:12px">
                    변경 대상 업무
                    <button type="button" class="btn-digitek-circle-sm" aria-label="업무 추가">+</button>
                  </td>
                  <td class="p-0" style="min-height:40px">
                    <!-- [커스텀] + 버튼 클릭 시 table-digitek 동적 생성 -->
                  </td>
                </tr>
              </tbody>
            </table>

          </div><!-- /d-flex flex-column gap-digitek-8 mt-digitek-8 -->

            </div><!-- /accordion-digitek-page-content -->
          </div><!-- /accordion-digitek-page -->
        </div><!-- /digitek-sections -->
      </div>
    </turbo-frame>
  </th:block>
</body>
</html>
