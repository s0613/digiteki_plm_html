<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>코드 추가/상세 (Code Management)</title>
  <link rel="stylesheet" href="../../css/bootstrap.min.css">
  <link rel="stylesheet" href="../../css/digitek.css">
  <link rel="stylesheet" href="../../css/icons.css">
  <style>body { margin: 0; background: #fff; }</style>
</head>
<body>
<!-- 코드 추가/상세 페이지: Sidebar + GNB + Content 전체 레이아웃 -->
<div class="layout-digitek">
  <!-- 사이드바 (SidebarLoader) -->
  <div data-sidebar></div>

  <div class="layout-digitek-main-area">
    <div data-gnb></div>
    <!-- 콘텐츠 영역 -->
    <div class="flex-grow-1 overflow-y-digitek-auto" style="background: var(--digitek-bg-gray);">
      <!-- 코드 관리 콘텐츠 영역 -->
<div class="code-manage-layout">

  <!-- 상단: 페이지 헤더 -->
  <div class="code-manage-header">
    <h6 class="code-manage-header-title">공통코드 관리</h6>
    <div class="code-manage-header-actions">
      <!-- [커스텀] 수정/등록 버튼: th:onclick 또는 JS 바인딩 -->
      <button type="button" class="btn btn-sm btn-outline-warning">수정</button>
      <button type="button" class="btn btn-sm btn-primary">등록</button>
    </div>
  </div>

  <!-- 검색 바 -->
  <div class="code-manage-search-bar">
    <label for="codeSearchColumn">컬럼 선택:</label>
    <!-- [커스텀] select 옵션: th:each로 동적 바인딩 -->
    <select id="codeSearchColumn">
      <option value="codeValue">코드값</option>
      <option value="code">code</option>
    </select>
    <label for="codeSearchInput">검색:</label>
    <input type="text" id="codeSearchInput" placeholder="검색어 입력">
  </div>

  <!-- 좌우 분할 영역 -->
  <div class="code-manage-body">
    <!-- 좌: 코드 목록 -->
    <div class="code-manage-list">
      <h6 class="code-manage-section-title">코드 목록</h6>
      <!-- [커스텀] Grid 영역: 코드 목록 테이블 -->
      <table class="table table-bordered table-sm mb-0">
        <thead>
          <tr>
            <th>코드값</th>
            <th>code</th>
          </tr>
        </thead>
        <tbody>
          <!-- [커스텀] th:each="item : ${codeList}" 으로 동적 바인딩 -->
          <tr>
            <td>DIGI</td>
            <td>DG001</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- 우: 공통코드 상세 정보 -->
    <div class="code-manage-detail">
      <h6 class="code-manage-section-title">공통코드 상세 정보</h6>
      <!-- [커스텀] Grid 영역: 상세 정보 테이블 -->
      <table class="table table-bordered table-sm mb-0">
        <tbody>
          <!-- [커스텀] th:text="${item.XXX}" 으로 각 필드 동적 바인딩 -->
          <tr><th>Code</th><td>DG001</td></tr>
          <tr><th>코드값</th><td>DIGI</td></tr>
          <tr><th>코드 타입</th><td>DGCODE</td></tr>
          <tr><th>DD Code</th><td>DG001</td></tr>
          <tr><th>부모 코드</th><td></td></tr>
          <tr><th>부모 타입</th><td></td></tr>
          <tr><th>etc1</th><td></td></tr>
          <tr><th>etc2</th><td></td></tr>
          <tr><th>etc3</th><td></td></tr>
          <tr><th>etc4</th><td></td></tr>
          <tr><th>etc5</th><td></td></tr>
          <tr><th>Description</th><td></td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
    </div>
  </div>
</div>

<script src="../../js/jquery.slim.min.js"></script>
<script src="../../js/bootstrap.bundle.min.js"></script>
<script src="../../js/digitek.js"></script>
</body>
</html>
