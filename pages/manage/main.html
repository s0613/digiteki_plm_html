<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/shell}">
<head>
  <title>메인</title>
</head>
<body>
  <th:block layout:fragment="content">
    <!-- 메인 페이지 콘텐츠: 6개 영역 (높이 조절 가능) -->
<!-- [커스텀] 각 영역 height는 필요에 따라 수정하세요 -->
<div class="main-page-grid">
  <!-- 1행: 3등분 (각 span 2) -->
  <div class="main-page-area" style="grid-column: span 2; height: 200px;">
    <!-- [커스텀] 영역 1 내용 -->
  </div>
  <div class="main-page-area" style="grid-column: span 2; height: 200px;">
    <!-- [커스텀] 영역 2 내용 -->
  </div>
  <div class="main-page-area" style="grid-column: span 2; height: 200px;">
    <!-- [커스텀] 영역 3 내용 -->
  </div>
  <!-- 2행: 2등분 (각 span 3) -->
  <div class="main-page-area" style="grid-column: span 3; height: 250px;">
    <!-- [커스텀] 영역 4 내용 -->
  </div>
  <div class="main-page-area" style="grid-column: span 3; height: 250px;">
    <!-- [커스텀] 영역 5 내용 -->
  </div>
  <!-- 3행: 전체 너비 (span 6) -->
  <div class="main-page-area" style="grid-column: span 6; height: 200px;">
    <!-- [커스텀] 영역 6 내용 -->
  </div>
</div>
  </th:block>
</body>
</html>
