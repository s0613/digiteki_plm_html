<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/shell}">
<head>
  <title>코드 관리</title>
</head>
<body>
  <th:block layout:fragment="content">
    <turbo-frame id="main-content">
      <!-- 코드 관리 콘텐츠 영역 -->
<div style="display:flex; flex-direction:column; gap:16px; padding:16px; background:var(--digitek-bg-white); min-height:100%;">

  <!-- 상단: 페이지 헤더 -->
  <div class="page-header-digitek">
    <h6 class="content-section-title-digitek">공통코드 관리</h6>
    <div class="d-flex gap-digitek-8">
      <!-- [커스텀] 수정/등록 버튼: th:onclick 또는 JS 바인딩 -->
      <button type="button" class="btn btn-digitek btn-digitek-outline btn-digitek-36">수정</button>
      <button type="button" class="btn btn-digitek btn-digitek-primary btn-digitek-36">등록</button>
    </div>
  </div>

  <!-- 검색 바 -->
  <div class="d-flex align-items-center gap-digitek-12">
    <label for="codeSearchColumn" style="font-size:13px; font-weight:500; white-space:nowrap; margin:0;">컬럼 선택:</label>
    <!-- [커스텀] select 옵션: th:each로 동적 바인딩 -->
    <select id="codeSearchColumn" style="height:32px; font-size:13px; border:1px solid var(--digitek-border); border-radius:4px; padding:0 8px;">
      <option value="codeValue">코드값</option>
      <option value="code">code</option>
    </select>
    <label for="codeSearchInput" style="font-size:13px; font-weight:500; white-space:nowrap; margin:0;">검색:</label>
    <input type="text" id="codeSearchInput" placeholder="검색어 입력" style="height:32px; font-size:13px; border:1px solid var(--digitek-border); border-radius:4px; padding:0 8px;">
  </div>

  <!-- 좌우 분할 영역 -->
  <div style="display:flex; gap:16px; flex:1; min-height:0;">
    <!-- 좌: 코드 목록 -->
    <div class="content-panel-digitek" style="flex:0 0 35%; min-height:400px; border-radius:4px;">
      <h6 class="content-section-title-digitek">코드 목록</h6>
      <!-- [커스텀] Grid 영역: 코드 목록 테이블 -->
      <table class="table table-bordered table-sm mb-0">
        <thead>
          <tr>
            <th>코드값</th>
            <th>code</th>
          </tr>
        </thead>
        <tbody>
          <!-- [커스텀] th:each="item : ${codeList}" 으로 동적 바인딩 -->
          <tr>
            <td>DIGI</td>
            <td>DG001</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- 우: 공통코드 상세 정보 -->
    <div class="content-panel-digitek" style="flex:1; min-height:400px; border-radius:4px;">
      <!-- [커스텀] Grid 영역: 상세 정보 -->
      <div class="digitek-info-grid">
        <div class="digitek-info-title">공통코드 상세 정보</div>
        <!-- [커스텀] th:text="${item.XXX}" 으로 각 필드 동적 바인딩 -->
        <div class="digitek-info-field-full">
          <span class="digitek-info-label"><span class="badge-digitek-category">Code</span></span>
          <span class="digitek-info-value">DG001</span>
        </div>
        <div class="digitek-info-row">
          <div class="digitek-info-field">
            <span class="digitek-info-label"><span class="badge-digitek-category">코드값</span></span>
            <span class="digitek-info-value">DIGI</span>
          </div>
          <div class="digitek-info-field">
            <span class="digitek-info-label"><span class="badge-digitek-category">코드 타입</span></span>
            <span class="digitek-info-value">DGCODE</span>
          </div>
        </div>
        <div class="digitek-info-row">
          <div class="digitek-info-field">
            <span class="digitek-info-label"><span class="badge-digitek-category">DD Code</span></span>
            <span class="digitek-info-value">DG001</span>
          </div>
          <div class="digitek-info-field">
            <span class="digitek-info-label"><span class="badge-digitek-category">부모 코드</span></span>
            <span class="digitek-info-value"></span>
          </div>
        </div>
        <div class="digitek-info-row">
          <div class="digitek-info-field">
            <span class="digitek-info-label"><span class="badge-digitek-category">부모 타입</span></span>
            <span class="digitek-info-value"></span>
          </div>
          <div class="digitek-info-field">
            <span class="digitek-info-label"><span class="badge-digitek-category">etc1</span></span>
            <span class="digitek-info-value"></span>
          </div>
        </div>
        <div class="digitek-info-row">
          <div class="digitek-info-field">
            <span class="digitek-info-label"><span class="badge-digitek-category">etc2</span></span>
            <span class="digitek-info-value"></span>
          </div>
          <div class="digitek-info-field">
            <span class="digitek-info-label"><span class="badge-digitek-category">etc3</span></span>
            <span class="digitek-info-value"></span>
          </div>
        </div>
        <div class="digitek-info-row">
          <div class="digitek-info-field">
            <span class="digitek-info-label"><span class="badge-digitek-category">etc4</span></span>
            <span class="digitek-info-value"></span>
          </div>
          <div class="digitek-info-field">
            <span class="digitek-info-label"><span class="badge-digitek-category">etc5</span></span>
            <span class="digitek-info-value"></span>
          </div>
        </div>
        <div class="digitek-info-field-full">
          <span class="digitek-info-label"><span class="badge-digitek-category">Description</span></span>
          <span class="digitek-info-value"></span>
        </div>
      </div>
    </div>
  </div>

</div>
    </turbo-frame>
  </th:block>
</body>
</html>
