<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>메인 페이지 (Main Page)</title>
  <link rel="stylesheet" href="../../css/bootstrap.min.css">
  <link rel="stylesheet" href="../../css/digitek.css">
  <link rel="stylesheet" href="../../css/icons.css">
  <style>body { margin: 0; background: #fff; }</style>
</head>
<body>
<!-- 메인 페이지: Sidebar + GNB + Content 전체 레이아웃 -->
<div class="layout-digitek">
  <!-- 사이드바 (SidebarLoader) -->
  <div data-sidebar></div>

  <div class="layout-digitek-main-area">
    <div data-gnb></div>
    <!-- 콘텐츠 영역 -->
    <div class="flex-grow-1 overflow-y-digitek-auto" style="background: var(--digitek-bg-gray);">
      <!-- 메인 페이지 콘텐츠: 6개 영역 (높이 조절 가능) -->
<!-- [커스텀] 각 영역 height는 필요에 따라 수정하세요 -->
<div class="main-page-grid">
  <!-- 1행: 3등분 (각 span 2) -->
  <div class="main-page-area" style="grid-column: span 2; height: 200px;">
    <!-- [커스텀] 영역 1 내용 -->
  </div>
  <div class="main-page-area" style="grid-column: span 2; height: 200px;">
    <!-- [커스텀] 영역 2 내용 -->
  </div>
  <div class="main-page-area" style="grid-column: span 2; height: 200px;">
    <!-- [커스텀] 영역 3 내용 -->
  </div>
  <!-- 2행: 2등분 (각 span 3) -->
  <div class="main-page-area" style="grid-column: span 3; height: 250px;">
    <!-- [커스텀] 영역 4 내용 -->
  </div>
  <div class="main-page-area" style="grid-column: span 3; height: 250px;">
    <!-- [커스텀] 영역 5 내용 -->
  </div>
  <!-- 3행: 전체 너비 (span 6) -->
  <div class="main-page-area" style="grid-column: span 6; height: 200px;">
    <!-- [커스텀] 영역 6 내용 -->
  </div>
</div>
    </div>
  </div>
</div>

<script src="../../js/jquery.slim.min.js"></script>
<script src="../../js/bootstrap.bundle.min.js"></script>
<script src="../../js/digitek.js"></script>
</body>
</html>
