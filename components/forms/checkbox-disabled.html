<!-- 비활성화 체크박스 -->
<!-- [커스텀] id, name 속성을 업무에 맞게 변경하세요 -->

<!-- 비활성화 (미선택) -->
<label class="checkbox-digitek checkbox-digitek-disabled" for="checkbox-disabled">
  <input type="checkbox" id="checkbox-disabled" name="myCheckbox" disabled />
  비활성화
</label>

<!-- 비활성화 (선택됨) -->
<label class="checkbox-digitek checkbox-digitek-disabled" for="checkbox-disabled-checked">
  <input type="checkbox" id="checkbox-disabled-checked" name="myCheckbox" disabled checked />
  비활성화 (선택됨)
</label>
