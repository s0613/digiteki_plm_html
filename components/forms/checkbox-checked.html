<!-- 선택된 체크박스 -->
<!-- [커스텀] id, name 속성을 업무에 맞게 변경하세요 -->
<label class="checkbox-digitek" for="checkbox-checked">
  <input type="checkbox" id="checkbox-checked" name="myCheckbox" checked />
  선택됨
</label>

<!-- 중간 상태 (indeterminate): JS로 input.indeterminate = true 설정 필요 -->
<label class="checkbox-digitek" for="checkbox-indeterminate">
  <input type="checkbox" id="checkbox-indeterminate" name="myCheckbox" />
  일부 선택됨
</label>
