<!-- 비활성화 라디오 버튼 -->
<!-- [커스텀] name 속성으로 같은 그룹의 라디오를 묶습니다 -->

<!-- 비활성화 (미선택) -->
<label class="radio-digitek radio-digitek-disabled" for="radio-dis-1">
  <input type="radio" id="radio-dis-1" name="radioGroupDis" value="option1" disabled />
  비활성화
</label>

<!-- 비활성화 (선택됨) -->
<label class="radio-digitek radio-digitek-disabled" for="radio-dis-2">
  <input type="radio" id="radio-dis-2" name="radioGroupDis" value="option2" disabled checked />
  비활성화 (선택됨)
</label>
